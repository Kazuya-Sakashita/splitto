default: &default
  adapter: mysql2
  encoding: utf8mb4
  pool: <%= ENV.fetch("RAILS_MAX_THREADS", 5) %>

  # docker-compose のサービス名（db）に接続
  host: <%= ENV.fetch("DATABASE_HOST", "db") %>
  port: <%= ENV.fetch("DATABASE_PORT", 3306) %>

  # compose 側のユーザー/パスワードに合わせる
  username: <%= ENV.fetch("DATABASE_USER", "app") %>
  password: <%= ENV.fetch("DATABASE_PASSWORD", "password") %>

  # タイムゾーンはアプリ側で UTC 統一（表示のみJST変換）
  timezone: UTC

development:
  <<: *default
  database: <%= ENV.fetch("DATABASE_NAME", "app_development") %>

test:
  <<: *default
  database: <%= ENV.fetch("DATABASE_NAME_TEST", "app_test") %>

production:
  primary: &primary_production
    <<: *default
    database: <%= ENV.fetch("DATABASE_NAME", "app_production") %>
    username: <%= ENV.fetch("DATABASE_USER", "app") %>
    password: <%= ENV.fetch("DATABASE_PASSWORD") %>

  cache:
    <<: *primary_production
    database: <%= ENV.fetch("CACHE_DATABASE_NAME", "app_production_cache") %>
    migrations_paths: db/cache_migrate

  queue:
    <<: *primary_production
    database: <%= ENV.fetch("QUEUE_DATABASE_NAME", "app_production_queue") %>
    migrations_paths: db/queue_migrate

  cable:
    <<: *primary_production
    database: <%= ENV.fetch("CABLE_DATABASE_NAME", "app_production_cable") %>
    migrations_paths: db/cable_migrate
