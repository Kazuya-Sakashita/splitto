openapi: 3.0.3
info:
  title: Splitto API
  version: 0.1.0
  description: >
    Splitto（割り勘・立替精算）API仕様（MVP）
  license:
    name: UNLICENSED

servers:
  - url: https://api.splitto.example.com
    description: Production (placeholder)
  - url: http://localhost:3000
    description: Rails API (local)

tags:
  - name: Auth
    description: 認証・ログインユーザー関連
  - name: Me
    description: ログインユーザー本人向け機能
  - name: Users
    description: ユーザー情報
  - name: Groups
    description: グループ管理
  - name: Members
    description: グループメンバー管理
  - name: Expenses
    description: 支払い（立替）管理
  - name: Attachments
    description: 添付ファイル
  - name: Audits
    description: 監査ログ
  - name: MailLogs
    description: メール送信履歴

security:
  - BearerAuth: []

paths:
  /api/v1/me:
    get:
      operationId: getMe
      tags:
        - Auth
      summary: ログインユーザー情報の取得
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/me/shared_group_users:
    get:
      operationId: getSharedGroupUsers
      tags:
        - Me
      summary: 同じグループになったことがあるユーザー一覧取得
      description: >
        ログインユーザーと同じグループに所属したことがある他ユーザー一覧を取得します。
        自分自身は含まれません。
        last_together_at の降順で返します。
      security:
        - BearerAuth: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SharedGroupUsersResponse"
              examples:
                default:
                  summary: shared group users response
                  value:
                    shared_group_users:
                      - user_id: usr_01HABCDEFG1234567890XYZ
                        last_together_at: "2026-03-05T10:00:00Z"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/users/{userId}:
    get:
      operationId: getUserById
      tags:
        - Users
      summary: ユーザー取得（ID）
      parameters:
        - $ref: "#/components/parameters/UserId"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/groups:
    get:
      operationId: listGroups
      tags:
        - Groups
      summary: グループ一覧（自分が所属する active=true のみ）
      parameters:
        - $ref: "#/components/parameters/Page"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GroupListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

    post:
      operationId: createGroup
      tags:
        - Groups
      summary: グループ作成
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GroupCreateRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GroupResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"

  /api/v1/groups/{groupId}:
    get:
      operationId: getGroup
      tags:
        - Groups
      summary: グループ詳細
      parameters:
        - $ref: "#/components/parameters/GroupId"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GroupDetailResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

    patch:
      operationId: updateGroup
      tags:
        - Groups
      summary: グループ更新
      parameters:
        - $ref: "#/components/parameters/GroupId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GroupUpdateRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GroupResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"

  /api/v1/groups/{groupId}/members:
    post:
      operationId: addMember
      tags:
        - Members
      summary: メンバー追加
      parameters:
        - $ref: "#/components/parameters/GroupId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MemberAddRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MemberResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"

  /api/v1/groups/{groupId}/members/{memberId}:
    delete:
      operationId: removeMember
      tags:
        - Members
      summary: メンバー削除（論理削除：退出 / 将来的にキック）
      description: >
        メンバーを論理削除します（active=false, left_at=now）。
        現状は自分自身のメンバーシップのみ削除可能（=退出）です。
        OWNER は退出できません（422）。
        既に inactive のメンバーに対する削除は冪等です（204）。
      parameters:
        - $ref: "#/components/parameters/GroupId"
        - $ref: "#/components/parameters/MemberId"
      responses:
        "204":
          description: No Content
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"

  /api/v1/groups/{groupId}/invite_token:
    patch:
      operationId: regenerateGroupInviteToken
      tags:
        - Groups
      summary: 招待トークン再生成
      description: >
        グループオーナーが招待トークンを再生成します。
        再生成後は旧トークンが無効化され、新しいトークンのみ有効になります。
      parameters:
        - $ref: "#/components/parameters/GroupId"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GroupInviteTokenResponse"
              examples:
                success:
                  summary: 招待トークン再生成成功
                  value:
                    invite_token: "new_invite_token_xxxxx"
                    invite_token_expires_at: "2026-03-21T10:14:20Z"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"

  /api/v1/groups/{groupId}/expenses:
    get:
      operationId: listExpenses
      tags:
        - Expenses
      summary: 支払い一覧
      parameters:
        - $ref: "#/components/parameters/GroupId"
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PerPage"
        - name: paid_on_from
          in: query
          required: false
          schema:
            type: string
            format: date
        - name: paid_on_to
          in: query
          required: false
          schema:
            type: string
            format: date
        - name: paid_by_id
          in: query
          required: false
          schema:
            type: integer
            format: int64
        - name: include_deleted
          in: query
          required: false
          schema:
            type: boolean
            default: false
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExpenseListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

    post:
      operationId: createExpense
      tags:
        - Expenses
      summary: 支払い作成（splitsを確定保存）
      parameters:
        - $ref: "#/components/parameters/GroupId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ExpenseCreateRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExpenseResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"

  /api/v1/groups/{groupId}/expenses/{expenseId}:
    get:
      operationId: getExpense
      tags:
        - Expenses
      summary: 支払い詳細
      parameters:
        - $ref: "#/components/parameters/GroupId"
        - $ref: "#/components/parameters/ExpenseId"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExpenseResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

    patch:
      operationId: updateExpense
      tags:
        - Expenses
      summary: 支払い更新（MVP）
      parameters:
        - $ref: "#/components/parameters/GroupId"
        - $ref: "#/components/parameters/ExpenseId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ExpenseUpdateRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExpenseResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"

    delete:
      operationId: deleteExpense
      tags:
        - Expenses
      summary: 支払い削除（論理削除）
      parameters:
        - $ref: "#/components/parameters/GroupId"
        - $ref: "#/components/parameters/ExpenseId"
      responses:
        "204":
          description: No Content
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/invites/{invite_token}:
    get:
      operationId: getInvite
      tags:
        - Groups
      summary: 招待トークンからグループ情報を取得（招待ページ表示用）
      description: >
        招待トークンから招待ページ表示用のグループ情報を取得します。
        招待トークンが存在しない場合、または有効期限切れの場合は 404 を返します。
      security: []
      parameters:
        - $ref: "#/components/parameters/InviteToken"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InviteGroupResponse"
        "404":
          description: 招待トークンが存在しない、または有効期限切れ
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"

  /api/v1/invites/{invite_token}/membership:
    post:
      operationId: createInviteMembership
      tags:
        - Members
      summary: 招待トークン経由でグループに参加する
      description: >
        招待トークンを使って、認証済みユーザーの membership を作成します。
        すでに active な member の場合は既存 membership を返し、
        inactive な member の場合は再参加状態に更新します。
      parameters:
        - $ref: "#/components/parameters/InviteToken"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InviteMembershipResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"

  /api/v1/groups/{groupId}/expenses/{expenseId}/attachments:
    post:
      operationId: createAttachment
      tags:
        - Attachments
      summary: 添付ファイルメタ情報の登録
      parameters:
        - $ref: "#/components/parameters/GroupId"
        - $ref: "#/components/parameters/ExpenseId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AttachmentCreateRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AttachmentResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"

  /api/v1/groups/{groupId}/audits:
    get:
      operationId: listAudits
      tags:
        - Audits
      summary: 監査ログ一覧
      parameters:
        - $ref: "#/components/parameters/GroupId"
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PerPage"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuditListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/groups/{groupId}/mail_logs:
    get:
      operationId: listMailLogs
      tags:
        - MailLogs
      summary: メール送信履歴一覧
      parameters:
        - $ref: "#/components/parameters/GroupId"
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PerPage"
        - name: status
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MailLogStatus"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MailLogListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    Page:
      name: page
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        default: 1

    PerPage:
      name: per_page
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20

    UserId:
      name: userId
      in: path
      required: true
      schema:
        type: string
        format: uuid

    GroupId:
      name: groupId
      in: path
      required: true
      schema:
        type: string
        example: MyjusiApaCFaYhQVSEAxzjs6Bw

    MemberId:
      name: memberId
      in: path
      required: true
      schema:
        type: string

    ExpenseId:
      name: expenseId
      in: path
      required: true
      schema:
        type: string

    InviteToken:
      name: invite_token
      in: path
      required: true
      schema:
        type: string
      description: 有効な招待リンク・招待QRコードに含まれる招待トークン

  responses:
    BadRequest:
      description: Bad Request
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/ProblemDetails"

    Unauthorized:
      description: Unauthorized
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/ProblemDetails"

    Forbidden:
      description: Forbidden
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/ProblemDetails"

    NotFound:
      description: Not Found
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/ProblemDetails"

    Conflict:
      description: Conflict
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/ProblemDetails"

    UnprocessableEntity:
      description: Unprocessable Entity
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/ProblemDetails"

  schemas:
    ProblemDetails:
      type: object
      required:
        - type
        - title
        - status
        - detail
        - reason
      properties:
        type:
          type: string
          example: about:blank
        title:
          type: string
          example: Unauthorized
        status:
          type: integer
          example: 401
        detail:
          type: string
          example: Authentication failed
        reason:
          type: string
          example: missing_token
        instance:
          type: string
          nullable: true
        errors:
          type: object
          nullable: true
          additionalProperties:
            type: array
            items:
              type: string

    SharedGroupUsersResponse:
      type: object
      required:
        - shared_group_users
      properties:
        shared_group_users:
          type: array
          description: 同じグループになったことがある他ユーザー一覧
          items:
            $ref: "#/components/schemas/SharedGroupUser"

    SharedGroupUser:
      type: object
      required:
        - user_id
        - last_together_at
      properties:
        user_id:
          type: string
          description: ユーザーの公開ID
          example: usr_01HABCDEFG1234567890XYZ
        last_together_at:
          type: string
          format: date-time
          description: 最後に同じグループにいたとみなす日時
          example: "2026-03-05T10:00:00Z"

    ThemeMode:
      type: string
      enum:
        - SYSTEM
        - LIGHT
        - DARK

    MemberRole:
      type: string
      enum:
        - OWNER
        - MEMBER

    SplitType:
      type: string
      enum:
        - EQUAL_ALL
        - EQUAL_SELECTED
        - AMOUNT
        - PERCENT

    MailLogStatus:
      type: string
      enum:
        - QUEUED
        - SENT
        - FAILED

    User:
      type: object
      required:
        - id
        - external_uid
        - created_at
        - updated_at
      properties:
        id:
          type: integer
          format: int64
        external_uid:
          type: string
        name:
          type: string
          nullable: true
        email:
          type: string
          nullable: true
        notify_email:
          type: boolean
          nullable: true
          default: true
        theme_mode:
          type: string
          allOf:
            - $ref: "#/components/schemas/ThemeMode"
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    UserResponse:
      type: object
      required:
        - user
      properties:
        user:
          $ref: "#/components/schemas/User"

    Group:
      type: object
      required:
        - public_id
        - name
        - currency
        - invite_token
        - created_at
        - updated_at
      properties:
        public_id:
          type: string
          example: MyjusiApaCFaYhQVSEAxzjs6Bw
        name:
          type: string
        currency:
          type: string
          example: JPY
        invite_token:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    GroupListItem:
      type: object
      required:
        - public_id
        - name
        - currency
        - updated_at
        - member_count
      properties:
        public_id:
          type: string
          example: "01H00000000000000000000012"
        name:
          type: string
          example: "新しい"
        currency:
          type: string
          example: "JPY"
        updated_at:
          type: string
          format: date-time
          example: "2026-02-21T23:10:38Z"
        member_count:
          type: integer
          example: 2

    GroupDetailResponse:
      type: object
      required:
        - group
        - members
      properties:
        group:
          type: object
          required:
            - public_id
            - name
            - currency
            - created_at
            - updated_at
          properties:
            public_id:
              type: string
              example: MyjusiApaCFaYhQVSEAxzjs6Bw
            name:
              type: string
              example: 大阪旅行
            currency:
              type: string
              example: JPY
            created_at:
              type: string
              format: date-time
            updated_at:
              type: string
              format: date-time
        members:
          type: array
          items:
            type: object
            required:
              - public_id
              - user_id
              - name
              - role
            properties:
              public_id:
                type: string
                description: Member の公開ID（退出 API 等で DELETE 対象に使う）
                example: 01H00000000000000000000099
              user_id:
                type: string
                example: 01H00000000000000000000015
              name:
                type: string
                nullable: true
                description: User.name（未設定時は null）
              role:
                $ref: "#/components/schemas/MemberRole"

    GroupCreateRequest:
      type: object
      required:
        - group
      properties:
        group:
          type: object
          required:
            - name
          properties:
            name:
              type: string
              example: 旅行精算
            currency:
              type: string
              example: JPY
        members:
          type: array
          description: 追加メンバー（既存ユーザー想定）
          items:
            type: object
            required:
              - email
            properties:
              email:
                type: string
                format: email
                example: a@example.com

    GroupUpdateRequest:
      type: object
      properties:
        name:
          type: string
        currency:
          type: string

    GroupResponse:
      type: object
      required:
        - group
      properties:
        group:
          $ref: "#/components/schemas/Group"

    GroupListResponse:
      type: object
      required:
        - groups
        - meta
      properties:
        groups:
          type: array
          items:
            $ref: "#/components/schemas/GroupListItem"
